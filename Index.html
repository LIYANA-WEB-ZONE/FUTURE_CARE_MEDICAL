        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
            font-size: 18px;
        }
        h1, h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .container {
            max-width: 100%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        #searchInput {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            box-sizing: border-box;
        }
        #verifyBtn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #4a90e2;
            background-color: #4a90e2;
            color: white;
            margin-bottom: 20px;
        }
        #verifyBtn:hover {
            background-color: #357ab8;
        }
        .result {
            background: #f5f7ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 0;
            border: 1px solid #e0e5ff;
            font-size: 16px;
        }
        .result-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #d0d5ff;
            word-break: break-word;
        }
        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .label {
            font-weight: bold;
            color: #444;
            display: inline-block;
            width: 30%;
            vertical-align: top;
        }
        .value {
            color: #222;
            display: inline-block;
            width: 68%;
        }
        .not-found {
            color: #d32f2f;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>

                </div>

                </div>

                </div>

                </div>
